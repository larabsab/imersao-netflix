<!DOCTYPE html>
<!-- Define o tipo de documento como HTML5 -->
<html lang="pt-br">
<!-- Elemento raiz do HTML com atributo de idioma -->
<head>
    <!-- Contém metadados e links de estilo -->
    <meta charset="UTF-8">
    <!-- Define a codificação de caracteres para UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ajusta a escala da página em dispositivos móveis -->
    <title>Netflix - Selecionar Perfil</title>
    <!-- Ícone da aba do navegador -->
    <link rel="icon" href="../favicon.svg?v=1" type="image/svg+xml">
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <!-- Importa o arquivo CSS principal -->
</head>
<body>
    <!-- Corpo visível da página -->
    <main>
        <!-- Conteúdo principal da página -->
        <header>
            <!-- Cabeçalho com título principal -->
            <h1>Quem está assistindo?</h1>
            <!-- Título principal da seleção de perfil -->
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema" aria-pressed="false"></button>
            <!-- Toggle de tema claro/escuro -->
        </header>

        <ul class="profiles" aria-label="Perfis de usuário">
            <!-- Lista de perfis de usuário -->
            <li class="profile">
                <!-- Item de perfil individual -->
                <a href="catalogo/catalogo.html">
                    <!-- Link clicável que envolve avatar e nome -->
                    <div class="avatar-wrapper">
                        <!-- Envoltório do avatar com bordas arredondadas -->
                        <img src="assets/perfil-1.png" alt="Jovem de estilo animação 3D com cabelos longos e loiros, olhos azuis expressivos e batom rosa coral, vestindo uma camiseta branca e uma jaqueta de couro preta com detalhes em vermelho, tudo contra um fundo verde-lima sólido." loading="lazy">
                        <!-- Imagem do avatar com carregamento preguiçoso -->
                    </div>
                    <span class="profile-name">Rowena</span>
                    <!-- Nome do perfil exibido abaixo do avatar -->
                </a>
            </li>
            <li class="profile">
                <a href="catalogo/catalogo.html">
                    <div class="avatar-wrapper">
                        <img src="assets/perfil-2.png" alt="Jovem com traços inspirados em Timothée Chalamet, vestindo um terno preto bordado e um lenço azul de bolinhas, posicionado à frente de um painel repleto de rosas em tons pastéis." loading="lazy">
                    </div>
                    <span class="profile-name">Leo</span>
                    <div class="lock-icon">
                        <!-- Ícone de cadeado indicando perfil protegido -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <!-- SVG do cadeado para indicar restrição -->
                            <rect x="5" y="11" width="14" height="10" rx="2" ry="2"></rect>
                            <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
                        </svg>
                    </div>
                </a>
            </li>
            <li class="profile">
                <a href="catalogo/catalogo.html">
                    <div class="avatar-wrapper">
                        <img src="assets/perfil-3.png" alt="Uma jovem com longos cabelos ondulados e franja, usando uma blusa preta de gola alta e acessórios dourados, em frente a uma casa." loading="lazy">
                    </div>
                    <span class="profile-name">Vee</span>
                </a>
            </li>
            <li class="profile">
                <a href="catalogo/catalogo.html">
                    <div class="avatar-wrapper">
                        <img src="assets/perfil-4.png" alt="Uma jovem ruiva com grandes olhos verdes, usando brincos dourados de grife e um colar delicado, contra um fundo rosa suave." loading="lazy">
                    </div>
                    <span class="profile-name">Lola</span>
                </a>
            </li>
            <li class="profile">
                <a href="catalogo/catalogo.html">
                    <div class="avatar-wrapper">
                        <img src="assets/perfil-5.png" alt="Um jovem sem camisa e de colar de prata, segurando uma prancha de surfe de madeira perto de uma van VW Kombi branca e desgastada à beira-mar." loading="lazy">
                    </div>
                    <span class="profile-name">Alex</span>
                </a>
            </li>
        </ul>

        <div class="actions">
            <!-- Área de ações secundárias -->
            <a href="#" class="btn-manage">Gerenciar perfis</a>
            <!-- Botão para gerenciar perfis -->
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
